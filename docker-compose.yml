services:

  # =========================
  # API
  # =========================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: sicou-api
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DB_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      APP_PORT: ${APP_PORT:-4444}
    ports:
      - '${APP_PORT}:${APP_PORT}'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - sicou-network
    restart: unless-stopped

  # =========================
  # Worker (Mailer)
  # =========================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: sicou-worker
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DB_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - sicou-network
    restart: unless-stopped

  # =========================
  # Kafka (KRaft)
  # =========================
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - sicou-network
    restart: unless-stopped

  # =========================
  # RabbitMQ
  # =========================
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - sicou-network
    restart: unless-stopped

  # =========================
  # PostgreSQL
  # =========================
  postgres:
    image: postgres:16
    container_name: postgres
    env_file: .env
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pkg/database/001_INIT.sql:/docker-entrypoint-initdb.d/001_INIT.sql:ro
      - ./pkg/database/002_INIT.sql:/docker-entrypoint-initdb.d/002_INIT.sql:ro
      - ./pkg/database/003_AREA.sql:/docker-entrypoint-initdb.d/003_AREA.sql:ro
      - ./pkg/database/005_OTP.sql:/docker-entrypoint-initdb.d/005_OTP.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sicou-network
    restart: unless-stopped

  # =========================
  # MinIO
  # =========================
  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
    volumes:
      - minio_data:/data
    networks:
      - sicou-network
    restart: unless-stopped

# =========================
# Volúmenes
# =========================
volumes:
  kafka_data:
  rabbitmq_data:
  postgres_data:
  minio_data:

    # =========================
    # Red
    # =========================
networks:
  sicou-network:
    driver: bridge
